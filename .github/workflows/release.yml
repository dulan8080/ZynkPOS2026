name: Release ZynkPOS

# Triggers when you push a tag like: git tag v1.0.2 && git push origin v1.0.2
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY_RAW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $rawKey = $env:TAURI_SIGNING_PRIVATE_KEY_RAW.TrimEnd()
          $keyContent = "untrusted comment: rsign encrypted secret key`n$rawKey`n"
          $env:TAURI_SIGNING_PRIVATE_KEY = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($keyContent))
          npm run tauri build -- --bundles nsis

      - name: Collect artifacts
        id: artifacts
        shell: pwsh
        run: |
          $dir = "src-tauri\target\release\bundle\nsis"
          Write-Host "=== Files in $dir ==="
          Get-ChildItem $dir | Select-Object Name | Format-Table -AutoSize

          $exe = (Get-ChildItem $dir -Filter "*-setup.exe" | Select-Object -First 1).FullName
          if (-not $exe) { Write-Error "No *-setup.exe found in $dir"; exit 1 }
          Write-Host "Installer: $exe"

          $sig = (Get-ChildItem $dir -Filter "*.exe.sig" | Select-Object -First 1).FullName
          if (-not $sig) { Write-Error "No .exe.sig found in $dir"; exit 1 }
          Write-Host "Signature: $sig"

          echo "sig=$sig" >> $env:GITHUB_OUTPUT
          echo "exe=$exe" >> $env:GITHUB_OUTPUT

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "ver=$ver" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ZynkPOS v${{ steps.version.outputs.ver }}
          body: |
            ## ZynkPOS v${{ steps.version.outputs.ver }}

            Download the Windows installer below.
          files: |
            ${{ steps.artifacts.outputs.sig }}
            ${{ steps.artifacts.outputs.exe }}
          draft: false
          prerelease: false
