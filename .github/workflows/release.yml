name: Release ZynkPOS

# Triggers when you push a tag like: git tag v1.0.2 && git push origin v1.0.2
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Check signing secrets
        shell: pwsh
        run: |
          if (-not "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}") {
            Write-Host "ERROR: TAURI_SIGNING_PRIVATE_KEY secret is not set!" -ForegroundColor Red
            Write-Host "Go to: https://github.com/dulan8080/ZynkPOS2026/settings/secrets/actions" -ForegroundColor Yellow
            exit 1
          }
          Write-Host "Signing secrets are present." -ForegroundColor Green

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: List bundle output
        shell: pwsh
        run: |
          Write-Host "=== Bundle directory contents ==="
          Get-ChildItem "src-tauri\target\release\bundle" -Recurse -File | Select-Object FullName

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "ver=$ver" >> $env:GITHUB_OUTPUT

      - name: Collect artifacts
        id: artifacts
        shell: pwsh
        run: |
          $dir = "src-tauri\target\release\bundle\nsis"
          $zip = (Get-ChildItem $dir -Filter "*.nsis.zip" | Select-Object -First 1).FullName
          $sig = (Get-ChildItem $dir -Filter "*.nsis.zip.sig" | Select-Object -First 1).FullName
          $exe = (Get-ChildItem $dir -Filter "*-setup.exe" | Select-Object -First 1).FullName
          if (-not $zip) { Write-Host "ERROR: no .nsis.zip found in $dir" -ForegroundColor Red; Get-ChildItem $dir; exit 1 }
          if (-not $sig) { Write-Host "ERROR: no .sig found — signing key missing?" -ForegroundColor Red; exit 1 }
          Write-Host "zip: $zip"
          Write-Host "sig: $sig"
          Write-Host "exe: $exe"
          echo "zip=$zip" >> $env:GITHUB_OUTPUT
          echo "sig=$sig" >> $env:GITHUB_OUTPUT
          echo "exe=$exe" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ZynkPOS v${{ steps.version.outputs.ver }}
          body: |
            ## ZynkPOS v${{ steps.version.outputs.ver }}

            Download the Windows installer below.
          files: |
            ${{ steps.artifacts.outputs.zip }}
            ${{ steps.artifacts.outputs.sig }}
            ${{ steps.artifacts.outputs.exe }}
          draft: false
          prerelease: false
