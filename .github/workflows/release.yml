name: Release ZynkPOS

# Triggers when you push a tag like: git tag v1.0.2 && git push origin v1.0.2
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Setup signing key
        shell: pwsh
        run: |
          $keyB64 = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          if (-not $keyB64) { Write-Host "ERROR: TAURI_SIGNING_PRIVATE_KEY is not set!"; exit 1 }
          $keyBytes = [System.Convert]::FromBase64String($keyB64.Trim())
          $keyText  = [System.Text.Encoding]::UTF8.GetString($keyBytes)
          $keyPath  = "$env:RUNNER_TEMP\tauri-signing.key"
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText($keyPath, $keyText, $utf8NoBom)
          Write-Host "Signing key written to: $keyPath"
          Write-Host "Key starts: $($keyText.Substring(0, [Math]::Min(40, $keyText.Length)))"
          # Store as TAURI_KEY_PATH so Tauri build does NOT auto-sign (we'll sign manually)
          "TAURI_KEY_PATH=$keyPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build Tauri app
        run: npm run tauri build -- --bundles nsis

      - name: Create and sign update archive
        id: artifacts
        shell: pwsh
        run: |
          $dir = "src-tauri\target\release\bundle\nsis"
          Write-Host "=== Bundle directory ==="
          Get-ChildItem $dir -Recurse -File | Select-Object FullName

          $exe = (Get-ChildItem $dir -Filter "*-setup.exe" | Select-Object -First 1).FullName
          if (-not $exe) { Write-Host "ERROR: No *-setup.exe found in $dir"; exit 1 }
          Write-Host "Installer: $exe"

          # Create .nsis.zip update archive (zip containing the installer at root)
          $zip = $exe -replace "-setup\.exe$", "-setup.nsis.zip"
          Compress-Archive -Path $exe -DestinationPath $zip -Force
          Write-Host "Archive created: $zip"

          # Sign the archive using tauri signer CLI (key has no password)
          $keyPath = $env:TAURI_KEY_PATH
          Write-Host "Signing with key: $keyPath"
          npx tauri signer sign -k $keyPath --password "" $zip
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: tauri signer sign exited $LASTEXITCODE"; exit 1 }

          $sig = "$zip.sig"
          if (-not (Test-Path $sig)) { Write-Host "ERROR: .sig file not created at $sig"; exit 1 }
          Write-Host "Signature: $sig"

          echo "zip=$zip" >> $env:GITHUB_OUTPUT
          echo "sig=$sig" >> $env:GITHUB_OUTPUT
          echo "exe=$exe" >> $env:GITHUB_OUTPUT

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "ver=$ver" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ZynkPOS v${{ steps.version.outputs.ver }}
          body: |
            ## ZynkPOS v${{ steps.version.outputs.ver }}

            Download the Windows installer below.
          files: |
            ${{ steps.artifacts.outputs.zip }}
            ${{ steps.artifacts.outputs.sig }}
            ${{ steps.artifacts.outputs.exe }}
          draft: false
          prerelease: false
