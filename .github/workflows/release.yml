name: Release ZynkPOS

# Triggers when you push a tag like: git tag v1.0.2 && git push origin v1.0.2
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Check signing secrets
        shell: pwsh
        run: |
          if (-not "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}") {
            Write-Host "ERROR: TAURI_SIGNING_PRIVATE_KEY secret is not set!" -ForegroundColor Red
            Write-Host "Go to: https://github.com/dulan8080/ZynkPOS2026/settings/secrets/actions" -ForegroundColor Yellow
            exit 1
          }
          Write-Host "Signing secrets are present." -ForegroundColor Green

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "ver=$ver" >> $env:GITHUB_OUTPUT

      - name: Collect artifacts
        id: artifacts
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.ver }}"
          $dir = "src-tauri\target\release\bundle\nsis"
          $zip = "$dir\ZynkPOS_${ver}_x64-setup.nsis.zip"
          $sig = "$dir\ZynkPOS_${ver}_x64-setup.nsis.zip.sig"
          $exe = "$dir\ZynkPOS_${ver}_x64-setup.exe"
          echo "zip=$zip" >> $env:GITHUB_OUTPUT
          echo "sig=$sig" >> $env:GITHUB_OUTPUT
          echo "exe=$exe" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ZynkPOS v${{ steps.version.outputs.ver }}
          body: |
            ## ZynkPOS v${{ steps.version.outputs.ver }}

            Download the Windows installer below.
          files: |
            ${{ steps.artifacts.outputs.zip }}
            ${{ steps.artifacts.outputs.sig }}
            ${{ steps.artifacts.outputs.exe }}
          draft: false
          prerelease: false
